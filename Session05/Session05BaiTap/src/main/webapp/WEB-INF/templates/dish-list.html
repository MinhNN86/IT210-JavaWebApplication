<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/main-layout}">
<head>
  <title>Danh sách món ăn</title>
  <style>
    .out-of-stock {
      color: red;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div layout:fragment="content">
    <h1>Danh sách món ăn</h1>

    <!-- ❗ Trường hợp danh sách rỗng -->
    <div th:if="${dishes == null or #lists.isEmpty(dishes)}">
      <p>Hiện tại nhà hàng đang cập nhật thực đơn, vui lòng quay lại sau</p>
    </div>

    <!-- ❗ Có dữ liệu -->
    <table border="1" th:unless="${dishes == null or #lists.isEmpty(dishes)}">
      <tr>
        <th>ID</th>
        <th>Tên món</th>
        <th>Giá</th>
        <th>Trạng thái</th>
      </tr>

      <tr th:each="dish : ${dishes}">
        <td th:text="${dish.id}"></td>
        <td th:text="${dish.name}"></td>
        <td th:text="${dish.price}"></td>

        <!-- xử lý trạng thái -->
        <td>
          <span th:if="${dish.available}" th:text="'Còn hàng'"></span>
          <span th:unless="${dish.available}"
                class="out-of-stock"
                th:text="'Hết hàng'"></span>
        </td>

        <td>
          <a th:href="@{|/bai3/edit/${dish.id}|}">Chỉnh sửa</a>
        </td>
      </tr>
    </table>
  </div>
</body>
</html>
